# src/main/resources/application.yml
server:
  port: 8081

spring:
  application:
    name: board

  # H2 Database 설정 (개발용)
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # H2 Console 활성화
  h2:
    console:
      enabled: true  # http://localhost:8081/h2-console

  jpa:
    hibernate:
      ddl-auto: create   # 서버 실행 시 엔티티를 보고 테이블 자동 생성
    show-sql: true
    # [핵심 설정] Hibernate가 테이블을 다 만든 후에 data.sql이 실행되게 합니다.
    defer-datasource-initialization: true

    sql:
      init:
        mode: always # 항상 data.sql을 실행하도록 설정

  # Thymeleaf 설정
  thymeleaf:
    cache: false          # 개발 시 캐시 비활성화

# 로깅 설정
logging:
  level:
    com.example.board: DEBUG
    org.hibernate.SQL: DEBUG
