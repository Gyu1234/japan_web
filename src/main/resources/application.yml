# src/main/resources/application.yml
server:
  port: 8080

spring:
  application:
    name: board

  # H2 Database 설정 (개발용)
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # H2 Console 활성화
  h2:
    console:
      enabled: true  # http://localhost:8080/h2-console

  # JPA 설정
  jpa:
    hibernate:
      ddl-auto: create    # 개발: create, 운영: validate
    show-sql: true        # SQL 로그 출력
    properties:
      hibernate:
        format_sql: true  # SQL 포맷팅

  # Thymeleaf 설정
  thymeleaf:
    cache: false          # 개발 시 캐시 비활성화

# 로깅 설정
logging:
  level:
    com.example.board: DEBUG
    org.hibernate.SQL: DEBUG
