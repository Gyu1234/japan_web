<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CSS -->
    <link rel="stylesheet" href="/frontend/./src/pages/Foodpage.css">

    <title>SideBar sub menus</title>
</head>
 <body>
    <main>
      <section class="top-search-filter">
        <div class="search-widget">
          <input type="text" placeholder="지역,카테고리,키워드로 검색하세요">
          <button class="search-btn">Search</button>
        </div>
        <div class="quick-filter">
          <button class="filter-btn">지역전체</button>
          <button class="filter-btn">음식</button>
          <button class="filter-btn">평점순</button>
        </div>
      </section>
      <section class="search-result-section">
        <div class="result-list">

          <article class="result-card">
            <div class="card-image">
              <img src="/frontend/public/sushi_1.jpg" alt="도쿄 스시 사카나 대표 이미지">
            </div>
            <div class="card-content">
              <div class="content-head">
                <h3 class="restaurant-name">도쿄 스시 사카나 대표 이미지</h3>
              </div>
            </div>
          </article>
        </div>
      </section>
    </main>

    <!-- JS -->
    <script src="/frontend/src/Foodpage.js"></script>
</body>
</html>
